services:

    ################################################################################
    # Symfony 8 + PHP 8.4
    sf8:
        image:          "registry.gitlab.com/badpixxel-projects/php-sdk:php-8.4"
        init:           true
        container_name: sf8.brevo-bridge.local
        hostname:       sf8.brevo-bridge.local
        volumes:
            - ../:/var/www/html
            - sf8-var:/var/www/html/var
            - sf8-vendor:/var/www/html/vendor
        environment:
            COMPOSER_ROOT_VERSION: 6.0.x-dev
            SERVER_ROOT:        /var/www/html/tests/public
            SYMFONY_REQUIRE:    8.*

volumes:
    sf8-var:        ~
    sf8-vendor:     ~