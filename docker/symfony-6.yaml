services:

    ################################################################################
    # Symfony 6 + PHP 8.2
    sf6:
        image:          "registry.gitlab.com/badpixxel-projects/php-sdk:php-8.2"
        init:           true
        container_name: sf6.brevo-bridge.local
        hostname:       sf6.brevo-bridge.local
        volumes:
            - ../:/var/www/html
            - sf6-var:/var/www/html/var
            - sf6-vendor:/var/www/html/vendor
        environment:
            COMPOSER_ROOT_VERSION: 6.0.x-dev
            SERVER_ROOT:        /var/www/html/tests/public
            SYMFONY_REQUIRE:    6.4.*

volumes:
    sf6-var:        ~
    sf6-vendor:     ~